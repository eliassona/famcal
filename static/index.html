<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAF8F5;
    --surface: #FFFFFF;
    --border: #E8E4DF;
    --text: #2C3E50;
    --text-muted: #8A9BAE;
    --today-bg: #2C3E50;
    --today-text: #FFFFFF;
    --accent: #7FB069;
    --accent2: #F4A261;

    /* Family member colors */
    --c1: #E07A5F;
    --c2: #3D9BE9;
    --c3: #7FB069;
    --c4: #F4A261;
    --c5: #9B72CF;
    --c6: #E8A598;

    --radius: 12px;
    --shadow: 0 2px 12px rgba(44,62,80,0.08);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }
  .logo {
    font-size: 1.25rem;
    font-weight: 800;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo span { color: var(--accent); }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .btn {
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    border-radius: 8px;
    transition: all 0.15s;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    padding: 8px 16px;
    font-size: 0.875rem;
  }
  .btn-primary:hover { filter: brightness(0.92); }
  .btn-icon {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    font-size: 1rem;
    display: flex;
    align-items: center;
  }
  .btn-icon:hover { background: var(--bg); }

  /* ── LAYOUT ── */
  .app-body {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .sidebar-section { padding: 16px; border-bottom: 1px solid var(--border); }
  .sidebar-label {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  /* Mini calendar */
  .mini-cal { width: 100%; }
  .mini-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .mini-nav-title { font-weight: 700; font-size: 0.875rem; }
  .mini-nav-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 1rem;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .mini-nav-btn:hover { background: var(--bg); color: var(--text); }
  .mini-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    text-align: center;
  }
  .mini-dow {
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--text-muted);
    padding: 2px 0;
  }
  .mini-day {
    font-size: 0.75rem;
    padding: 4px 2px;
    border-radius: 50%;
    cursor: pointer;
    font-weight: 500;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .mini-day:hover { background: var(--bg); }
  .mini-day.today { background: var(--today-bg); color: var(--today-text); font-weight: 700; }
  .mini-day.selected { background: var(--accent); color: #fff; }
  .mini-day.other-month { color: var(--border); }
  .mini-day.has-event { position: relative; }
  .mini-day.has-event::after {
    content: '';
    position: absolute;
    bottom: 2px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--accent);
  }

  /* Family members */
  .member-list { display: flex; flex-direction: column; gap: 6px; }
  .member-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 8px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .member-item:hover { background: var(--bg); }
  .member-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .member-name { font-size: 0.85rem; font-weight: 600; flex: 1; }
  .member-count {
    font-size: 0.7rem;
    background: var(--bg);
    border-radius: 999px;
    padding: 1px 7px;
    color: var(--text-muted);
    font-weight: 700;
  }
  .member-toggle { display: flex; gap: 6px; }
  .member-item.hidden .member-name { opacity: 0.4; text-decoration: line-through; }
  .add-member-btn {
    width: 100%;
    padding: 7px;
    border: 1.5px dashed var(--border);
    border-radius: 8px;
    background: none;
    font-family: inherit;
    font-size: 0.8rem;
    color: var(--text-muted);
    cursor: pointer;
    margin-top: 6px;
    font-weight: 600;
  }
  .add-member-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Upcoming events */
  .upcoming-list { display: flex; flex-direction: column; gap: 8px; }
  .upcoming-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 8px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .upcoming-item:hover { background: var(--bg); }
  .upcoming-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .upcoming-info { flex: 1; min-width: 0; }
  .upcoming-title { font-size: 0.82rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .upcoming-date { font-size: 0.73rem; color: var(--text-muted); margin-top: 1px; }
  .upcoming-empty { font-size: 0.8rem; color: var(--text-muted); text-align: center; padding: 12px 0; }

  /* ── MAIN CALENDAR ── */
  .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* Toolbar */
  .cal-toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .cal-title { font-size: 1.3rem; font-weight: 800; flex: 1; }
  .view-tabs { display: flex; background: var(--bg); border-radius: 8px; padding: 3px; gap: 2px; }
  .view-tab {
    padding: 5px 12px;
    font-size: 0.78rem;
    font-weight: 700;
    border: none;
    background: none;
    border-radius: 6px;
    cursor: pointer;
    color: var(--text-muted);
    font-family: inherit;
    transition: all 0.15s;
  }
  .view-tab.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .today-btn {
    padding: 6px 14px;
    font-size: 0.8rem;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 700;
    transition: all 0.15s;
  }
  .today-btn:hover { background: var(--bg); }
  .nav-arrows { display: flex; gap: 4px; }
  .nav-arrow {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.15s;
  }
  .nav-arrow:hover { background: var(--bg); }

  /* Month grid */
  .cal-grid-wrap { flex: 1; overflow-y: auto; padding: 16px; }
  .month-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    min-height: 540px;
  }
  .dow-header {
    background: var(--surface);
    padding: 8px 4px;
    text-align: center;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
  }
  .day-cell {
    background: var(--surface);
    padding: 6px;
    min-height: 90px;
    cursor: pointer;
    transition: background 0.1s;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .day-cell:hover { background: #F5F3F0; }
  .day-cell.other-month { background: #F9F7F4; }
  .day-cell.other-month .day-num { color: var(--border); }
  .day-cell.today .day-num {
    background: var(--today-bg);
    color: var(--today-text);
    border-radius: 50%;
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
  }
  .day-cell.selected { background: #EFF8EC; }
  .day-num {
    font-size: 0.8rem;
    font-weight: 700;
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .event-chip {
    font-size: 0.7rem;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    color: white;
    transition: filter 0.1s;
  }
  .event-chip:hover { filter: brightness(0.9); }
  .more-events {
    font-size: 0.68rem;
    color: var(--text-muted);
    font-weight: 700;
    padding: 1px 4px;
  }

  /* Week view */
  .week-grid {
    display: grid;
    grid-template-columns: 50px repeat(7, 1fr);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--border);
    gap: 1px;
  }
  .week-time-col { background: var(--surface); }
  .week-day-header {
    background: var(--surface);
    text-align: center;
    padding: 8px 4px;
    font-size: 0.75rem;
    font-weight: 700;
  }
  .week-day-header.today-col { background: #EFF8EC; }
  .week-day-name { color: var(--text-muted); font-size: 0.65rem; text-transform: uppercase; }
  .week-day-num { font-size: 1.1rem; font-weight: 800; }
  .week-day-num.is-today {
    background: var(--today-bg);
    color: #fff;
    border-radius: 50%;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    margin: 2px auto 0;
  }
  .time-slot {
    background: var(--surface);
    min-height: 50px;
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 2px 4px;
  }
  .time-slot.today-col { background: #FAFFFD; }
  .time-label {
    background: var(--surface);
    font-size: 0.65rem;
    color: var(--text-muted);
    font-weight: 600;
    display: flex;
    align-items: flex-start;
    padding: 4px 4px 0;
    min-height: 50px;
  }

  /* List / Agenda view */
  .agenda-list { display: flex; flex-direction: column; gap: 0; }
  .agenda-date-header {
    padding: 12px 16px 6px;
    font-size: 0.78rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-muted);
    position: sticky;
    top: 0;
    background: var(--bg);
  }
  .agenda-event {
    display: flex;
    gap: 12px;
    padding: 10px 16px;
    border-radius: var(--radius);
    margin: 0 4px 2px;
    cursor: pointer;
    transition: background 0.1s;
    align-items: flex-start;
  }
  .agenda-event:hover { background: var(--surface); }
  .agenda-color-bar { width: 4px; border-radius: 4px; min-height: 36px; flex-shrink: 0; }
  .agenda-event-info { flex: 1; }
  .agenda-event-title { font-size: 0.9rem; font-weight: 700; }
  .agenda-event-meta { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }
  .agenda-empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .agenda-empty-icon { font-size: 2.5rem; margin-bottom: 10px; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(44,62,80,0.45);
    backdrop-filter: blur(3px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border-radius: 16px;
    width: 100%;
    max-width: 440px;
    padding: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    transform: translateY(12px);
    transition: transform 0.2s;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .modal-title { font-size: 1.1rem; font-weight: 800; }
  .modal-close {
    background: var(--bg);
    border: none;
    border-radius: 8px;
    width: 32px; height: 32px;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { background: var(--border); }
  .form-group { margin-bottom: 14px; }
  label { display: block; font-size: 0.78rem; font-weight: 700; margin-bottom: 5px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  input[type="text"], input[type="date"], input[type="time"], select, textarea {
    width: 100%;
    padding: 9px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.9rem;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); background: #fff; }
  textarea { resize: vertical; min-height: 70px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .checkbox-row { display: flex; align-items: center; gap: 8px; }
  .checkbox-row input[type="checkbox"] { width: auto; }
  .checkbox-row label { margin: 0; text-transform: none; font-size: 0.85rem; }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .btn-danger { background: #E07A5F; color: #fff; padding: 8px 16px; font-size: 0.875rem; }
  .btn-danger:hover { filter: brightness(0.9); }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 8px 16px; font-size: 0.875rem; }
  .btn-ghost:hover { background: var(--bg); }

  /* Color picker */
  .color-swatches { display: flex; gap: 8px; flex-wrap: wrap; }
  .color-swatch {
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.selected { border-color: var(--text); transform: scale(1.1); }

  /* Weather widget */
  .weather-widget {
    background: linear-gradient(135deg, #3D9BE9 0%, #2C3E50 100%);
    border-radius: var(--radius);
    padding: 12px;
    color: white;
    margin-bottom: 4px;
  }
  .weather-top { display: flex; align-items: center; justify-content: space-between; }
  .weather-temp { font-size: 1.8rem; font-weight: 800; }
  .weather-icon { font-size: 2rem; }
  .weather-desc { font-size: 0.75rem; opacity: 0.85; margin-top: 2px; }
  .weather-loc { font-size: 0.7rem; opacity: 0.7; }

  /* ── EVENT DETAIL MODAL ── */
  .event-detail-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 4px; }
  .event-detail-meta { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
  .event-detail-row { display: flex; gap: 10px; align-items: flex-start; font-size: 0.875rem; }
  .event-detail-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
  .event-detail-actions { display: flex; gap: 8px; margin-top: 20px; }

  /* Recurrence badge */
  .recurrence-badge {
    display: inline-block;
    font-size: 0.65rem;
    font-weight: 700;
    background: var(--bg);
    border-radius: 4px;
    padding: 2px 6px;
    color: var(--text-muted);
    margin-left: 6px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: #fff;
    padding: 10px 20px;
    border-radius: 999px;
    font-size: 0.85rem;
    font-weight: 600;
    z-index: 999;
    transition: transform 0.3s;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Sidebar toggle on mobile */
  .sidebar-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 99;
  }

  /* ── TODO VIEW ── */
  .todo-wrap {
    flex: 1;
    display: flex;
    gap: 20px;
    padding: 20px;
    overflow-y: auto;
    align-items: flex-start;
  }
  .todo-column {
    flex: 1;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    min-width: 0;
    display: flex;
    flex-direction: column;
  }
  .todo-column-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
  }
  .todo-column-title {
    font-size: 0.8rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .todo-count {
    background: var(--bg);
    border-radius: 999px;
    padding: 1px 8px;
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--text-muted);
  }
  .todo-list { padding: 8px; display: flex; flex-direction: column; gap: 4px; min-height: 60px; }
  .todo-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.1s;
    border: 1px solid transparent;
  }
  .todo-item:hover { background: var(--bg); border-color: var(--border); }
  .todo-item.done .todo-text { text-decoration: line-through; opacity: 0.45; }
  .todo-check {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    margin-top: 2px;
    transition: all 0.15s;
    cursor: pointer;
    font-size: 0.65rem;
    color: transparent;
  }
  .todo-check:hover { border-color: var(--accent); }
  .todo-item.done .todo-check { background: var(--accent); border-color: var(--accent); color: white; }
  .todo-body { flex: 1; min-width: 0; }
  .todo-text { font-size: 0.875rem; font-weight: 600; word-break: break-word; }
  .todo-meta { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; display: flex; gap: 8px; flex-wrap: wrap; }
  .todo-priority-dot {
    width: 6px; height: 6px; border-radius: 50%; margin-top: 6px; flex-shrink: 0;
  }
  .priority-high   { background: #E07A5F; }
  .priority-normal { background: #8A9BAE; }
  .priority-low    { background: #B5CDA3; }

  .add-todo-btn {
    width: calc(100% - 16px);
    margin: 0 8px 8px;
    padding: 8px;
    border: 1.5px dashed var(--border);
    border-radius: 8px;
    background: none;
    font-family: inherit;
    font-size: 0.8rem;
    color: var(--text-muted);
    cursor: pointer;
    font-weight: 600;
    text-align: left;
  }
  .add-todo-btn:hover { border-color: var(--accent); color: var(--accent); }

  .todo-empty {
    text-align: center;
    padding: 24px 16px;
    color: var(--text-muted);
    font-size: 0.82rem;
  }

  /* header app switcher */
  .app-tabs {
    display: flex;
    background: var(--bg);
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
  }
  .app-tab {
    padding: 5px 14px;
    font-size: 0.8rem;
    font-weight: 700;
    border: none;
    background: none;
    border-radius: 6px;
    cursor: pointer;
    color: var(--text-muted);
    font-family: inherit;
    transition: all 0.15s;
  }
  .app-tab.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

  @media (max-width: 768px) {

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {

</style>

<script>
// ── API LAYER ──────────────────────────────────────────────────────────────
// All data lives on the Pi server. No localStorage.

const API = {
  async getState()            { return _get('/api/state'); },
  async createEvent(ev)       { return _post('/api/events', ev); },
  async updateEvent(id, ev)   { return _put(`/api/events/${id}`, ev); },
  async deleteEvent(id)       { return _del(`/api/events/${id}`); },
  async createMember(m)       { return _post('/api/members', m); },
  async updateMember(id, m)   { return _put(`/api/members/${id}`, m); },
  async deleteMember(id)      { return _del(`/api/members/${id}`); },
  async createTodo(t)         { return _post('/api/todos', t); },
  async updateTodo(id, t)     { return _put(`/api/todos/${id}`, t); },
  async deleteTodo(id)        { return _del(`/api/todos/${id}`); },
};

async function _get(url) {
  const r = await fetch(url); if (!r.ok) throw new Error(r.statusText);
  return r.json();
}
async function _post(url, body) {
  const r = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  if (!r.ok) throw new Error(r.statusText); return r.json();
}
async function _put(url, body) {
  const r = await fetch(url, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  if (!r.ok) throw new Error(r.statusText); return r.json();
}
async function _del(url) {
  const r = await fetch(url, { method:'DELETE' });
  if (!r.ok) throw new Error(r.statusText); return r.json();
}

// ── STATE ──────────────────────────────────────────────────────────────────
const COLORS = ['#E07A5F','#3D9BE9','#7FB069','#F4A261','#9B72CF','#E8A598','#2C9EA8','#D4854A','#5C7A4E','#B85C8C'];

// In-memory state — loaded from server once at startup
let state = { members: [], events: [], todos: [] };

// "visible" is a UI-only concept (not persisted to server)
let memberVisibility = {};   // { memberId: bool }

function uid() { return 'e' + Math.random().toString(36).slice(2, 9); }

// ── VIEW STATE ─────────────────────────────────────────────────────────────
let currentView = 'month';
let viewDate = new Date();
viewDate.setDate(1);

// ── RENDER ─────────────────────────────────────────────────────────────────
function render() {
  renderSidebar();
  renderMain();
}

function memberColor(memberId) {
  const m = state.members.find(x => x.id === memberId);
  return m ? m.color : '#aaa';
}
function memberName(memberId) {
  const m = state.members.find(x => x.id === memberId);
  return m ? m.name : 'Everyone';
}
function isVisible(memberId) {
  return memberVisibility[memberId] !== false;
}
function visibleEvents(events) {
  return events.filter(e => isVisible(e.memberId));
}

// ── RECURRING EVENTS ───────────────────────────────────────────────────────
function getEventsForRange(startDate, endDate) {
  const results = [];
  const start = new Date(startDate), end = new Date(endDate);
  state.events.forEach(ev => {
    const evDate = new Date(ev.date + 'T00:00:00');
    if (!ev.recurrence || ev.recurrence === 'none') {
      if (evDate >= start && evDate <= end) results.push({ ...ev, _virtual: false });
    } else {
      let cur = new Date(evDate), safety = 0;
      while (cur <= end && safety < 500) {
        safety++;
        if (cur >= start) {
          const localDate = `${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}-${String(cur.getDate()).padStart(2,'0')}`;
          results.push({ ...ev, date: localDate, _virtual: cur.getTime() !== evDate.getTime() });
        }
        if (ev.recurrence === 'daily') cur.setDate(cur.getDate() + 1);
        else if (ev.recurrence === 'weekly') cur.setDate(cur.getDate() + 7);
        else if (ev.recurrence === 'monthly') cur.setMonth(cur.getMonth() + 1);
        else break;
      }
    }
  });
  return results;
}

function getEventsForDay(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return getEventsForRange(d, d).filter(e => e.date === dateStr);
}

// ── SIDEBAR ────────────────────────────────────────────────────────────────
function renderSidebar() {
  renderMiniCal();
  renderMembers();
  renderUpcoming();
}

let miniDate = new Date(viewDate);
function renderMiniCal() {
  const y = miniDate.getFullYear(), m = miniDate.getMonth();
  document.getElementById('miniTitle').textContent = miniDate.toLocaleString('default', { month: 'long', year: 'numeric' });
  const grid = document.getElementById('miniGrid');
  grid.innerHTML = '';
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'mini-dow'; el.textContent = d; grid.appendChild(el);
  });
  const first = new Date(y, m, 1).getDay();
  const days = new Date(y, m + 1, 0).getDate();
  const today = new Date();
  for (let i = 0; i < first; i++) { const el = document.createElement('div'); grid.appendChild(el); }
  for (let d = 1; d <= days; d++) {
    const el = document.createElement('div');
    el.className = 'mini-day';
    el.textContent = d;
    const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = today.getFullYear()===y && today.getMonth()===m && today.getDate()===d;
    if (isToday) el.classList.add('today');
    const evs = getEventsForDay(dateStr);
    if (visibleEvents(evs).length > 0) el.classList.add('has-event');
    el.addEventListener('click', () => {
      viewDate = new Date(y, m, d);
      if (currentView === 'month') viewDate.setDate(1);
      render();
    });
    grid.appendChild(el);
  }
}

function renderMembers() {
  const list = document.getElementById('memberList');
  list.innerHTML = '';
  state.members.forEach(m => {
    const count = state.events.filter(e => e.memberId === m.id).length;
    const visible = isVisible(m.id);
    const item = document.createElement('div');
    item.className = 'member-item' + (visible ? '' : ' hidden');
    item.innerHTML = `
      <div class="member-dot" style="background:${m.color}"></div>
      <div class="member-name">${m.name}</div>
      <div class="member-count">${count}</div>
    `;
    item.title = 'Click to show/hide · Double-click to edit';
    item.addEventListener('click', () => {
      memberVisibility[m.id] = !visible;
      render();
    });
    item.addEventListener('dblclick', e => { e.stopPropagation(); openMemberModal(m); });
    list.appendChild(item);
  });
}

function renderUpcoming() {
  const list = document.getElementById('upcomingList');
  list.innerHTML = '';
  const today = new Date(); today.setHours(0,0,0,0);
  const end = new Date(today); end.setDate(end.getDate() + 30);
  const evs = visibleEvents(getEventsForRange(today, end));
  evs.sort((a,b) => (a.date+a.time).localeCompare(b.date+b.time));
  const shown = evs.slice(0, 8);
  if (!shown.length) { list.innerHTML = '<div class="upcoming-empty">No upcoming events</div>'; return; }
  shown.forEach(ev => {
    const item = document.createElement('div');
    item.className = 'upcoming-item';
    const evDate = new Date(ev.date + 'T00:00:00');
    const isToday = evDate.toDateString() === new Date().toDateString();
    const isTomorrow = evDate.toDateString() === new Date(Date.now()+86400000).toDateString();
    const label = isToday ? 'Today' : isTomorrow ? 'Tomorrow' : evDate.toLocaleDateString('default', { weekday:'short', month:'short', day:'numeric' });
    item.innerHTML = `
      <div class="upcoming-dot" style="background:${memberColor(ev.memberId)}"></div>
      <div class="upcoming-info">
        <div class="upcoming-title">${ev.title}</div>
        <div class="upcoming-date">${label}${ev.time ? ' · ' + formatTime(ev.time) : ''} · ${memberName(ev.memberId)}</div>
      </div>
    `;
    item.addEventListener('click', () => openDetailModal(ev));
    list.appendChild(item);
  });
}

// ── MAIN CALENDAR ──────────────────────────────────────────────────────────
function renderMain() {
  if (currentView === 'month') {
    document.getElementById('calTitle').textContent = viewDate.toLocaleString('default', { month:'long', year:'numeric' });
  } else if (currentView === 'week') {
    const ws = getWeekStart(viewDate), we = new Date(ws); we.setDate(we.getDate() + 6);
    document.getElementById('calTitle').textContent =
      ws.toLocaleDateString('default', { month:'short', day:'numeric' }) + ' – ' +
      we.toLocaleDateString('default', { month:'short', day:'numeric', year:'numeric' });
  } else {
    document.getElementById('calTitle').textContent = viewDate.toLocaleString('default', { month:'long', year:'numeric' });
  }
  const wrap = document.getElementById('calGridWrap');
  wrap.innerHTML = '';
  if (currentView === 'month') renderMonthView(wrap);
  else if (currentView === 'week') renderWeekView(wrap);
  else renderAgendaView(wrap);
}

function renderMonthView(wrap) {
  const y = viewDate.getFullYear(), m = viewDate.getMonth();
  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const today = new Date();
  const rangeStart = new Date(y, m, 1 - firstDay);
  const rangeEnd = new Date(y, m + 1, 7);
  const allEvs = visibleEvents(getEventsForRange(rangeStart, rangeEnd));
  const grid = document.createElement('div');
  grid.className = 'month-grid';
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => {
    const h = document.createElement('div'); h.className = 'dow-header'; h.textContent = d; grid.appendChild(h);
  });
  const rows = Math.ceil((firstDay + daysInMonth) / 7);
  for (let i = 0; i < rows * 7; i++) {
    const dayOffset = i - firstDay + 1;
    const cellDate = new Date(y, m, dayOffset);
    const dateStr = `${cellDate.getFullYear()}-${String(cellDate.getMonth()+1).padStart(2,'0')}-${String(cellDate.getDate()).padStart(2,'0')}`;
    const isToday = cellDate.toDateString() === today.toDateString();
    const isOther = cellDate.getMonth() !== m;
    const cell = document.createElement('div');
    cell.className = 'day-cell' + (isOther ? ' other-month' : '') + (isToday ? ' today' : '');
    cell.addEventListener('click', () => openEventModalForDate(dateStr));
    const num = document.createElement('div');
    num.className = 'day-num'; num.textContent = cellDate.getDate(); cell.appendChild(num);
    const dayEvs = allEvs.filter(e => e.date === dateStr);
    dayEvs.sort((a,b) => (a.time||'').localeCompare(b.time||''));
    const maxChips = rows > 5 ? 2 : 3;
    dayEvs.slice(0, maxChips).forEach(ev => {
      const chip = document.createElement('div');
      chip.className = 'event-chip';
      chip.style.background = memberColor(ev.memberId);
      chip.textContent = (ev.time ? formatTime(ev.time) + ' ' : '') + ev.title;
      chip.addEventListener('click', e => { e.stopPropagation(); openDetailModal(ev); });
      cell.appendChild(chip);
    });
    if (dayEvs.length > maxChips) {
      const more = document.createElement('div');
      more.className = 'more-events';
      more.textContent = `+${dayEvs.length - maxChips} more`;
      cell.appendChild(more);
    }
    grid.appendChild(cell);
  }
  wrap.appendChild(grid);
}

function getWeekStart(date) {
  const d = new Date(date); d.setDate(d.getDate() - d.getDay()); d.setHours(0,0,0,0); return d;
}

function renderWeekView(wrap) {
  const weekStart = getWeekStart(viewDate);
  const days = Array.from({length:7}, (_,i) => { const d = new Date(weekStart); d.setDate(d.getDate()+i); return d; });
  const rangeEnd = new Date(weekStart); rangeEnd.setDate(rangeEnd.getDate() + 6);
  const allEvs = visibleEvents(getEventsForRange(weekStart, rangeEnd));
  const today = new Date();
  const grid = document.createElement('div'); grid.className = 'week-grid';
  grid.appendChild(document.createElement('div')).style.background = 'var(--surface)';
  days.forEach(d => {
    const isT = d.toDateString()===today.toDateString();
    const h = document.createElement('div');
    h.className = 'week-day-header' + (isT ? ' today-col' : '');
    h.innerHTML = `<div class="week-day-name">${d.toLocaleString('default',{weekday:'short'})}</div>
      <div class="${isT ? 'week-day-num is-today' : 'week-day-num'}">${d.getDate()}</div>`;
    grid.appendChild(h);
  });
  for (let hour = 6; hour < 22; hour++) {
    const lbl = document.createElement('div'); lbl.className = 'time-label';
    lbl.textContent = hour===12 ? '12pm' : hour<12 ? `${hour}am` : `${hour-12}pm`;
    grid.appendChild(lbl);
    days.forEach(d => {
      const isT = d.toDateString()===today.toDateString();
      const slot = document.createElement('div');
      slot.className = 'time-slot' + (isT ? ' today-col' : '');
      const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      allEvs.filter(ev => ev.date===dateStr && (ev.time ? parseInt(ev.time)==hour : hour===8))
        .forEach(ev => {
          const chip = document.createElement('div');
          chip.className = 'event-chip'; chip.style.background = memberColor(ev.memberId);
          chip.style.marginBottom = '2px'; chip.textContent = ev.title;
          chip.addEventListener('click', e => { e.stopPropagation(); openDetailModal(ev); });
          slot.appendChild(chip);
        });
      slot.addEventListener('click', () => openEventModalForDate(dateStr, String(hour).padStart(2,'0')+':00'));
      grid.appendChild(slot);
    });
  }
  wrap.appendChild(grid);
}

function renderAgendaView(wrap) {
  const y = viewDate.getFullYear(), m = viewDate.getMonth();
  const start = new Date(y,m,1), end = new Date(y,m+1,0);
  const evs = visibleEvents(getEventsForRange(start, end));
  evs.sort((a,b) => (a.date+a.time).localeCompare(b.date+b.time));
  const list = document.createElement('div'); list.className = 'agenda-list';
  if (!evs.length) {
    list.innerHTML = `<div class="agenda-empty"><div class="agenda-empty-icon">📅</div>
      <div style="font-weight:700;font-size:1rem;margin-bottom:4px">Nothing this month</div>
      <div style="font-size:0.85rem">Hit <strong>+ Add Event</strong> to get started</div></div>`;
    wrap.appendChild(list); return;
  }
  let lastDate = '';
  evs.forEach(ev => {
    if (ev.date !== lastDate) {
      lastDate = ev.date;
      const dh = document.createElement('div'); dh.className = 'agenda-date-header';
      const d = new Date(ev.date+'T00:00:00');
      dh.textContent = d.toDateString()===new Date().toDateString() ? '📍 Today'
        : d.toLocaleDateString('default', { weekday:'long', month:'long', day:'numeric' });
      list.appendChild(dh);
    }
    const item = document.createElement('div'); item.className = 'agenda-event';
    item.innerHTML = `
      <div class="agenda-color-bar" style="background:${memberColor(ev.memberId)}"></div>
      <div class="agenda-event-info">
        <div class="agenda-event-title">${ev.title}${ev.recurrence&&ev.recurrence!=='none'?`<span class="recurrence-badge">↻ ${ev.recurrence}</span>`:''}</div>
        <div class="agenda-event-meta">
          ${ev.time?formatTime(ev.time):''}${ev.endTime?' – '+formatTime(ev.endTime):''} · ${memberName(ev.memberId)}${ev.location?' · 📍 '+ev.location:''}
        </div>
      </div>`;
    item.addEventListener('click', () => openDetailModal(ev));
    list.appendChild(item);
  });
  wrap.appendChild(list);
}

// ── MODALS ─────────────────────────────────────────────────────────────────
let editingEventId = null;

function openEventModalForDate(dateStr, time) {
  editingEventId = null;
  document.getElementById('modalTitle').textContent = 'New Event';
  document.getElementById('evTitle').value = '';
  document.getElementById('evDate').value = dateStr;
  document.getElementById('evTime').value = time || '09:00';
  document.getElementById('evEndTime').value = '';
  document.getElementById('evLocation').value = '';
  document.getElementById('evNotes').value = '';
  document.getElementById('evRecurrence').value = 'none';
  document.getElementById('deleteEventBtn').style.display = 'none';
  populateMemberSelect();
  openModal('eventModal');
  setTimeout(() => document.getElementById('evTitle').focus(), 200);
}

function openEventModalForEdit(ev) {
  editingEventId = ev.id;
  document.getElementById('modalTitle').textContent = 'Edit Event';
  document.getElementById('evTitle').value = ev.title;
  document.getElementById('evDate').value = ev.date;
  document.getElementById('evTime').value = ev.time || '';
  document.getElementById('evEndTime').value = ev.endTime || '';
  document.getElementById('evLocation').value = ev.location || '';
  document.getElementById('evNotes').value = ev.notes || '';
  document.getElementById('evRecurrence').value = ev.recurrence || 'none';
  document.getElementById('deleteEventBtn').style.display = 'inline-flex';
  populateMemberSelect(ev.memberId);

function populateMemberSelect(selectedId) {
  const sel = document.getElementById('evMember');
  sel.innerHTML = '<option value="">— Everyone —</option>';
  state.members.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m.id; opt.textContent = m.name;
    if (m.id === selectedId) opt.selected = true;
    sel.appendChild(opt);
  });
}

async function saveEvent() {
  const title = document.getElementById('evTitle').value.trim();
  if (!title) { shake('evTitle'); return; }
  const ev = {
    title,
    date: document.getElementById('evDate').value,
    time: document.getElementById('evTime').value,
    endTime: document.getElementById('evEndTime').value,
    memberId: document.getElementById('evMember').value,
    location: document.getElementById('evLocation').value.trim(),
    notes: document.getElementById('evNotes').value.trim(),
    recurrence: document.getElementById('evRecurrence').value,
  };
  try {
    if (editingEventId) {
      const updated = await API.updateEvent(editingEventId, ev);
      const idx = state.events.findIndex(e => e.id === editingEventId);
      if (idx >= 0) state.events[idx] = updated;
      showToast('Event updated!');
    } else {
      const created = await API.createEvent(ev);
      state.events.push(created);
      showToast('Event added!');
    }
    closeModal('eventModal');
    render();
  } catch(e) { showToast('⚠️ Save failed — check connection'); }
}

// Detail modal
let detailEventRef = null;
function openDetailModal(ev) {
  detailEventRef = ev;
  document.getElementById('detailTitle').textContent = ev.title;
  document.getElementById('detailDot').style.background = memberColor(ev.memberId);
  const meta = document.getElementById('detailMeta');
  meta.innerHTML = '';
  const evDate = new Date(ev.date+'T00:00:00');
  const isToday = evDate.toDateString() === new Date().toDateString();
  const dateLabel = isToday ? 'Today' : evDate.toLocaleDateString('default', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
  [
    ['📅', dateLabel + (ev.time ? ', '+formatTime(ev.time) : '') + (ev.endTime ? ' – '+formatTime(ev.endTime) : '')],
    ['👤', memberName(ev.memberId) || 'Everyone'],
    ...(ev.location ? [['📍', ev.location]] : []),
    ...(ev.recurrence&&ev.recurrence!=='none' ? [['↻', 'Repeats '+ev.recurrence]] : []),
    ...(ev.notes ? [['📝', ev.notes]] : []),
  ].forEach(([icon, text]) => {
    const row = document.createElement('div'); row.className = 'event-detail-row';
    row.innerHTML = `<span class="event-detail-icon">${icon}</span><span>${text}</span>`;
    meta.appendChild(row);
  });
  openModal('detailModal');
}

// Member modal
let editingMemberId = null;
let selectedColor = COLORS[0];

function openMemberModal(member) {
  editingMemberId = member ? member.id : null;
  document.getElementById('memberModalTitle').textContent = member ? 'Edit Person' : 'Add Person';
  document.getElementById('memberName').value = member ? member.name : '';
  document.getElementById('deleteMemberBtn').style.display = member ? 'inline-flex' : 'none';
  selectedColor = member ? member.color : COLORS[state.members.length % COLORS.length];
  renderColorSwatches();
  openModal('memberModal');
  setTimeout(() => document.getElementById('memberName').focus(), 200);
}

function renderColorSwatches() {
  const wrap = document.getElementById('colorSwatches'); wrap.innerHTML = '';
  COLORS.forEach(c => {
    const s = document.createElement('div');
    s.className = 'color-swatch' + (c===selectedColor ? ' selected' : '');
    s.style.background = c;
    s.addEventListener('click', () => { selectedColor = c; renderColorSwatches(); });
    wrap.appendChild(s);
  });
}

async function saveMember() {
  const name = document.getElementById('memberName').value.trim();
  if (!name) { shake('memberName'); return; }
  const payload = { name, color: selectedColor, visible: true };
  try {
    if (editingMemberId) {
      const updated = await API.updateMember(editingMemberId, payload);
      const idx = state.members.findIndex(m => m.id === editingMemberId);
      if (idx >= 0) state.members[idx] = { ...state.members[idx], ...updated };
    } else {
      const created = await API.createMember(payload);
      state.members.push(created);
      memberVisibility[created.id] = true;
    }
    closeModal('memberModal');
    render();
  } catch(e) { showToast('⚠️ Save failed — check connection'); }
}

async function deleteMember() {
  if (!editingMemberId) return;
  if (!confirm('Remove this person? Their events will stay but be unassigned.')) return;
  try {
    await API.deleteMember(editingMemberId);
    state.members = state.members.filter(m => m.id !== editingMemberId);
    state.events.forEach(ev => { if (ev.memberId === editingMemberId) ev.memberId = ''; });
    delete memberVisibility[editingMemberId];
    closeModal('memberModal');
    render();
  } catch(e) { showToast('⚠️ Delete failed — check connection'); }
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ── HELPERS ────────────────────────────────────────────────────────────────
function formatTime(t) {
  if (!t) return '';
  const [h, m] = t.split(':').map(Number);
  const ampm = h < 12 ? 'am' : 'pm';
  return `${h%12||12}:${String(m).padStart(2,'0')}${ampm}`;
}
function localDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function shake(id) {
  const el = document.getElementById(id);
  el.style.borderColor = '#E07A5F';
  el.animate([{transform:'translateX(-4px)'},{transform:'translateX(4px)'},{transform:'translateX(0)'}],{duration:200,iterations:2});
  setTimeout(() => el.style.borderColor = '', 1000);
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

});

document.getElementById('miniNext').addEventListener('click', () => { miniDate.setMonth(miniDate.getMonth()+1); renderMiniCal(); });

document.querySelectorAll('.view-tab').forEach(tab => {

// ── MOBILE SIDEBAR ─────────────────────────────────────────────────────────
function initMobileSidebar() {
  const toggle = document.getElementById('sidebarToggle');
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  toggle.style.display = window.innerWidth <= 768 ? 'flex' : 'none';
  toggle.addEventListener('click', () => { sidebar.classList.toggle('open'); overlay.classList.toggle('open'); });
  overlay.addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('open'); });
}
window.addEventListener('resize', () => {
  document.getElementById('sidebarToggle').style.display = window.innerWidth <= 768 ? 'flex' : 'none';
});

// ── WEATHER ────────────────────────────────────────────────────────────────
function fetchWeather() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude: lat, longitude: lon } = pos.coords;
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&temperature_unit=celsius`)
      .then(r => r.json()).then(data => {
        if (!data.current_weather) return;
        const temp = Math.round(data.current_weather.temperature);
        const wc = data.current_weather.weathercode;
        const iconMap = {0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',51:'🌦',61:'🌧',65:'🌧',71:'❄️',80:'🌦',95:'⛈'};
        const descMap = {0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Foggy',51:'Drizzle',61:'Light rain',65:'Heavy rain',71:'Snow',80:'Showers',95:'Thunderstorm'};
        document.getElementById('weatherTemp').textContent = `${temp}°C`;
        document.getElementById('weatherIcon').textContent = iconMap[wc] || '🌡';
        document.getElementById('weatherDesc').textContent = descMap[wc] || 'Weather';
        fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)
          .then(r => r.json()).then(geo => {
            document.getElementById('weatherLoc').textContent = geo.address?.city || geo.address?.town || geo.address?.village || '';
          }).catch(()=>{});
      }).catch(()=>{});
  }, () => { document.getElementById('weatherSection').style.display = 'none'; });
}

// ── APP SWITCHING ──────────────────────────────────────────────────────────
let currentApp = 'calendar';

function switchApp(app) {
  currentApp = app;
  const calBody   = document.querySelector('.app-body');
  const todoPanel = document.getElementById('todoPanel');
  const addEventBtn = document.getElementById('addEventBtn');
  const addTodoBtn  = document.getElementById('addTodoBtn');

  document.querySelectorAll('.app-tab').forEach(t => t.classList.toggle('active', t.dataset.app === app));

  if (app === 'calendar') {
    calBody.style.display   = 'flex';
    todoPanel.style.display = 'none';
    addEventBtn.style.display = '';
    addTodoBtn.style.display  = 'none';
  } else {
    calBody.style.display   = 'none';
    todoPanel.style.display = 'flex';
    addEventBtn.style.display = 'none';
    addTodoBtn.style.display  = '';
    renderTodos();
  }
}

document.querySelectorAll('.app-tab').forEach(tab => {
  tab.addEventListener('click', () => switchApp(tab.dataset.app));
});

// ── TODO RENDER ────────────────────────────────────────────────────────────
function renderTodos() {
  const wrap = document.getElementById('todoWrap');
  wrap.innerHTML = '';

  // Group: one column per member + one "Everyone" column
  const columns = [
    { id: '', label: 'Everyone', icon: '👨‍👩‍👧' },
    ...state.members.map(m => ({ id: m.id, label: m.name, icon: '', color: m.color })),
  ];

  columns.forEach(col => {
    const todos = state.todos.filter(t => t.memberId === col.id);
    if (todos.length === 0 && col.id !== '') return; // hide empty member columns unless Everyone

    const pending = todos.filter(t => !t.done);
    const done    = todos.filter(t =>  t.done);
    const sorted  = [
      ...pending.sort((a,b) => {
        const p = {high:0,normal:1,low:2};
        return (p[a.priority]||1) - (p[b.priority]||1) || (a.text||'').localeCompare(b.text||'');
      }),
      ...done,
    ];

    const col_el = document.createElement('div');
    col_el.className = 'todo-column';

    const hdr = document.createElement('div');
    hdr.className = 'todo-column-header';
    hdr.innerHTML = `
      <div class="todo-column-title">
        ${col.color ? `<span style="width:10px;height:10px;border-radius:50%;background:${col.color};display:inline-block"></span>` : col.icon}
        ${col.label}
        <span class="todo-count">${pending.length}</span>
      </div>`;
    col_el.appendChild(hdr);

    const list = document.createElement('div');
    list.className = 'todo-list';

    if (!sorted.length) {
      list.innerHTML = `<div class="todo-empty">No tasks yet</div>`;
    } else {
      sorted.forEach(todo => {
        const item = document.createElement('div');
        item.className = 'todo-item' + (todo.done ? ' done' : '');

        const priorityColor = { high:'#E07A5F', normal:'#8A9BAE', low:'#B5CDA3' }[todo.priority||'normal'];

        let metaParts = [];
        if (todo.due) {
          const d = new Date(todo.due + 'T00:00:00');
          const isOverdue = !todo.done && d < new Date(new Date().toDateString());
          metaParts.push(`<span style="${isOverdue ? 'color:#E07A5F;font-weight:700' : ''}">📅 ${d.toLocaleDateString('default',{month:'short',day:'numeric'})}</span>`);
        }
        if (todo.notes) metaParts.push(`📝 ${todo.notes.slice(0,40)}${todo.notes.length>40?'…':''}`);

        item.innerHTML = `
          <div class="todo-check" title="Toggle done">✓</div>
          <div class="todo-priority-dot" style="background:${priorityColor}"></div>
          <div class="todo-body">
            <div class="todo-text">${todo.text}</div>
            ${metaParts.length ? `<div class="todo-meta">${metaParts.join(' · ')}</div>` : ''}
          </div>`;

        item.querySelector('.todo-check').addEventListener('click', async e => {
          e.stopPropagation();
          try {
            const updated = await API.updateTodo(todo.id, { ...todo, done: !todo.done });
            const idx = state.todos.findIndex(t => t.id === todo.id);
            if (idx >= 0) state.todos[idx] = updated;
            renderTodos();
          } catch { showToast('⚠️ Update failed'); }
        });

        item.addEventListener('click', () => openTodoModal(todo));
        list.appendChild(item);
      });
    }

    col_el.appendChild(list);

    const addBtn = document.createElement('button');
    addBtn.className = 'add-todo-btn';
    addBtn.textContent = '+ Add task';
    addBtn.addEventListener('click', () => openTodoModal(null, col.id));
    col_el.appendChild(addBtn);

    wrap.appendChild(col_el);
  });
}

// ── TODO MODAL ─────────────────────────────────────────────────────────────
let editingTodoId = null;

function openTodoModal(todo, defaultMemberId) {
  editingTodoId = todo ? todo.id : null;
  document.getElementById('todoModalTitle').textContent = todo ? 'Edit Task' : 'New Task';
  document.getElementById('todoText').value   = todo ? todo.text : '';
  document.getElementById('todoDue').value    = todo ? (todo.due || '') : '';
  document.getElementById('todoNotes').value  = todo ? (todo.notes || '') : '';
  document.getElementById('todoPriority').value = todo ? (todo.priority || 'normal') : 'normal';
  document.getElementById('deleteTodoBtn').style.display = todo ? 'inline-flex' : 'none';

  // populate member select
  const sel = document.getElementById('todoMember');
  sel.innerHTML = '<option value="">— Everyone —</option>';
  state.members.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m.id; opt.textContent = m.name;
    sel.appendChild(opt);
  });
  sel.value = todo ? todo.memberId : (defaultMemberId || '');

  openModal('todoModal');
  setTimeout(() => document.getElementById('todoText').focus(), 200);
}

async function saveTodo() {
  const text = document.getElementById('todoText').value.trim();
  if (!text) { shake('todoText'); return; }
  const payload = {
    text,
    memberId: document.getElementById('todoMember').value,
    priority: document.getElementById('todoPriority').value,
    due:      document.getElementById('todoDue').value,
    notes:    document.getElementById('todoNotes').value.trim(),
    done:     false,
  };
  try {
    if (editingTodoId) {
      const existing = state.todos.find(t => t.id === editingTodoId);
      const updated = await API.updateTodo(editingTodoId, { ...payload, done: existing?.done || false });
      const idx = state.todos.findIndex(t => t.id === editingTodoId);
      if (idx >= 0) state.todos[idx] = updated;
      showToast('Task updated!');
    } else {
      const created = await API.createTodo(payload);
      state.todos.push(created);
      showToast('Task added!');
    }
    closeModal('todoModal');
    renderTodos();
  } catch { showToast('⚠️ Save failed'); }
}

document.getElementById('addTodoBtn').addEventListener('click', () => openTodoModal(null));
document.getElementById('saveTodoBtn').addEventListener('click', saveTodo);
document.getElementById('cancelTodoBtn').addEventListener('click', () => closeModal('todoModal'));
document.getElementById('closeTodoModal').addEventListener('click', () => closeModal('todoModal'));
document.getElementById('deleteTodoBtn').addEventListener('click', async () => {
  if (!editingTodoId || !confirm('Delete this task?')) return;
  try {
    await API.deleteTodo(editingTodoId);
    state.todos = state.todos.filter(t => t.id !== editingTodoId);
    closeModal('todoModal');
    showToast('Task deleted');
    renderTodos();
  } catch { showToast('⚠️ Delete failed'); }
});
document.getElementById('todoModal').addEventListener('click', e => {
  if (e.target === document.getElementById('todoModal')) closeModal('todoModal');
});

// ── INIT ───────────────────────────────────────────────────────────────────
async function init() {
  initMobileSidebar();
  showToast('⏳ Loading calendar…');
  try {
    const data = await API.getState();
    state.members = data.members || [];
    state.events  = data.events  || [];
    state.todos   = data.todos   || [];
    // Init all members as visible
    state.members.forEach(m => { memberVisibility[m.id] = true; });
    render();
    showToast('✅ Calendar loaded');
  } catch(e) {
    showToast('⚠️ Cannot reach server');
    document.getElementById('calGridWrap').innerHTML =
      `<div style="text-align:center;padding:60px 20px;color:var(--text-muted)">
        <div style="font-size:2.5rem">⚠️</div>
        <div style="font-weight:700;font-size:1.1rem;margin:12px 0 6px">Cannot reach server</div>
        <div style="font-size:0.875rem">Make sure <code>server.py</code> is running on the Pi</div>
      </div>`;
  }
  fetchWeather();
}

init();
